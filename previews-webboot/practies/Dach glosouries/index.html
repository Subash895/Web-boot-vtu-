<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>

<body>
  <div class="nav-warrper">

      <ul class="nav-list">

      </ul>
    </nav>
  </div>

  <div class="Image holder ">
    <img src="Imagefile/carret.jpg" class="background-img" width="100%">
    <h1 id="caption-1"> Grocery shoping done online</h1>
  </div>
  <h1 id="pop-cat">popular catogory</h1>
  <hr width="1300">
  <div class="feature-wrapper">
    <!-- this is the diary catogory -->

    <div class="product-container">
      <p class="cat-text">dairy product</p>
      <img src="Imagefile/dairy1.jpg" alt="">
      <div class="btn-container">
        <button type="button" class="veiw-more-button" name="button">veiw more</button>
      </div>
    </div>
    <!-- this is the cold meat catogory -->
    <div class="product-container">
      <p class="cat-text">cold meat product</p>
      <img src="Imagefile/meat.jpg" alt="">
      <div class="btn-container">
        <button type="button" class="veiw-more-button" name="button">veiw more</button>
      </div>
    </div>
    <!-- this is the vegitable catogory -->
    <div class="product-container">
      <p class="cat-text">Vegitable product</p>
      <img src="Imagefile/cocumber.jpg" alt="">
      <div class="btn-container">
        <button type="button" class="veiw-more-button" name="button">veiw more</button>
      </div>
    </div>

  <!-- this the social media conainer -->
  <div id="social-media-container" background-color="#00000">

      <img src="Imagefile/facebook.jpg" alt="">

      <img src="Imagefile/twiter.jpg" alt="">

      <p id="contact-us">Contact Us</p>
    </div>
    <form class="" action="index.html" method="post">

      <label class="form-item" for="fname"> First Name</label>
      <input type="text" id="fname" name="firstname" placeholder="Your First name" value="">
      <br><br>

      <label class="form-item" for="lname"> Last Name </label>
      <input type="text" id="lname" name="lastname" placeholder="Your Last name" value="">
      <br><br>

      <label class="form-item" for="subject">Subject</label>
      <textarea id="subject" name="subject" placeholder="how can we help " value=""></textarea>
      <br><br>
      <input type="submit" id="submit-btn" value="submit">

    </form>
